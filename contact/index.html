<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ========== META INFORMATION ========== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connect with Vishnu Gandarapu.">

    <title>Contact - Vishnu Gandarapu</title>

    <!-- ========== EXTERNAL LIBRARIES ========== -->
    <!-- Font Awesome icons for social media links (LinkedIn, Twitter, Email) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- ========== STYLESHEETS ========== -->
    <!-- Contact page styles (terminal/hacker aesthetic) -->
    <link rel="stylesheet" href="contact.css">

    <!-- ========== FAVICON & PWA ========== -->
    <!-- Favicon files for different devices and browser tabs -->
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <!-- PWA manifest for installable web app -->
    <link rel="manifest" href="../favicon/site.webmanifest">
</head>

<body>
    <!-- ========== MATRIX RAIN BACKGROUND ========== -->
    <!-- Animated digital rain canvas rendered behind all content -->
    <canvas id="matrix-bg" aria-hidden="true"></canvas>

    <!-- ========== CRT SCANLINE OVERLAY ========== -->
    <!-- Visual effect simulating old monitor scan lines -->
    <!-- z-index: 10 - overlays content but below interactive elements -->
    <div class="scanlines"></div>

    <!-- ========== CONTACT CONTAINER ========== -->
    <!-- Main content box with contact information and social links -->
    <div class="contact-container">
        <!-- Header with terminal-style title (typed out) -->
        <h2 class="typed-line" data-type=">> Contact"></h2>

        <!-- Contact introduction (typed out sequentially) -->
        <p class="typed-line" data-type="Vishnu Gandarapu"></p>
        <p class="typed-line" data-type="Status: Available for collaboration"></p>

        <br>

        <!-- ========== SOCIAL LINKS ROW ========== -->
        <!-- Revealed after typewriter sequence completes -->
        <div class="social-row reveal-on-typed" style="opacity: 0;">
            <!-- LinkedIn Profile Link -->
            <a class="link glitch-hover" href="https://linkedin.com/in/vishnu-gandarapu" target="_blank">
                <i class="fab fa-linkedin"></i>
            </a>

            <!-- Email Contact Link -->
            <a class="link glitch-hover" href="mailto:vishnugandarapu.dev@gmail.com">
                <i class="fas fa-envelope"></i>
            </a>
        </div>

        <!-- ========== BACK NAVIGATION ========== -->
        <a class="back-btn reveal-on-typed" href="../" style="opacity: 0;">[ RETURN ]</a>
    </div>

    <!-- Matrix rain animation -->
    <script src="matrix-rain.js" defer></script>

    <!-- Terminal typewriter + glitch effects -->
    <script src="contact.js" defer></script>

    <!-- ========== ANALYTICS ========== -->
    <!-- GoatCounter tracking for page views -->
    <script data-goatcounter="https://vgin.goatcounter.com/count" async src="//gc.zgo.at/count.js" defer>
    </script>

</body>

</html>
